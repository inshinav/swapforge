name: ci

on:
  push:
    branches: ['**']
  pull_request:

concurrency:
  group: swapforge-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install dependencies
        run: npm ci --no-fund
      - name: Production dependency audit
        run: npm audit --omit=dev
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Test server and web
        run: npm run test
      - name: Build exact SHA
        run: npm run build

