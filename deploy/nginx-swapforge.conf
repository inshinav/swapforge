# SwapForge — swapforge.inshinlab.com → 127.0.0.1:4315
# HTTPS добавляет certbot --nginx после появления DNS-записи.
server {
    listen 80;
    listen [::]:80;
    server_name swapforge.inshinlab.com;

    client_max_body_size 320m;

    auth_basic "SwapForge";
    auth_basic_user_file /etc/nginx/.htpasswd-swapforge;

    # ACME-челлендж должен ходить без basic auth
    location ^~ /.well-known/acme-challenge/ {
        auth_basic off;
        root /var/www/html;
    }

    location / {
        proxy_pass http://127.0.0.1:4315;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_send_timeout 300;
        # большие загрузки стримим в бэкенд, не буферим на диск nginx
        proxy_request_buffering off;
    }
}
