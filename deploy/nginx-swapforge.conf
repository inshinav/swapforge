# SwapForge под путём https://inshinlab.com/swapforge/
# Сниппет включается в server-блок inshinlab.com строкой: include snippets/swapforge.conf;
# Префикс /swapforge/ срезается (proxy_pass с URI) — бэкенд живёт на / (127.0.0.1:4315).

location = /swapforge {
    return 301 /swapforge/;
}

# Вебхуки платёжных провайдеров (Crypto Pay, Lava.top): их серверы не пройдут
# basic auth; auth вебхука = подпись/секрет по телу, которую проверяет приложение.
# Префиксная локация (^~) выигрывает у basic-auth-локации ниже.
# Для Lava.top можно дополнительно захардить IP: allow 158.160.60.174; deny all;
location ^~ /swapforge/api/billing/webhook/ {
    proxy_pass http://127.0.0.1:4315/api/billing/webhook/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30;
    proxy_send_timeout 30;
}

location ^~ /swapforge/ {
    auth_basic "SwapForge";
    auth_basic_user_file /etc/nginx/.htpasswd-swapforge;

    client_max_body_size 320m;

    proxy_pass http://127.0.0.1:4315/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300;
    proxy_send_timeout 300;
    # большие загрузки стримим в бэкенд, не буферим на диск nginx
    proxy_request_buffering off;
}
